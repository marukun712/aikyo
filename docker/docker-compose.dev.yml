# Common templates for development
x-companion-dev-base: &companion-dev-base
  build:
    context: ..
    dockerfile: docker/companion.Dockerfile
  volumes:
    - ..:/app
    - /app/node_modules
  environment:
    - NODE_ENV=development
  depends_on:
    - firehose

services:
  firehose:
    build:
      context: ..
      dockerfile: docker/firehose.Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ..:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - FIREHOSE_PORT=8080
    restart: unless-stopped

  # Development mode - only start polka by default
  polka:
    <<: *companion-dev-base
    environment:
      - COMPANION_CONFIG=polka
      - NODE_ENV=development
    restart: unless-stopped

  # Optional companions (can be started with: docker-compose -f docker-compose.dev.yml up china)
  china:
    <<: *companion-dev-base
    environment:
      - COMPANION_CONFIG=china
      - NODE_ENV=development
    restart: "no"
    profiles:
      - optional

  hanabi:
    <<: *companion-dev-base
    environment:
      - COMPANION_CONFIG=hanabi
      - NODE_ENV=development
    restart: "no"
    profiles:
      - optional

  mai:
    <<: *companion-dev-base
    environment:
      - COMPANION_CONFIG=mai
      - NODE_ENV=development
    restart: "no"
    profiles:
      - optional